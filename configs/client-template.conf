[Interface]
# The internal virtual IP address assigned to this specific client device
Address = 10.0.0.2/24

# CLIENT PRIVATE KEY (Keep this secret on your client device!)
PrivateKey = <YOUR_CLIENT_PRIVATE_KEY>

# Encrypted DNS queries will be routed to Cloudflare and Google DNS for privacy
DNS = 1.1.1.1, 8.8.8.8

[Peer]
# SERVER PUBLIC KEY (The public key matching your GCP VPN server)
PublicKey = <YOUR_SERVER_PUBLIC_KEY>

# The destination endpoint: Your free DuckDNS domain pointing to your GCP Static IP
Endpoint = <YOUR_SUBDOMAIN>.duckdns.org:51820

# Full Tunneling: 0.0.0.0/0 forces ALL internet traffic to go through the VPN tunnel
AllowedIPs = 0.0.0.0/0, ::/0

# Sends a keep-alive packet every 25 seconds to keep the NAT connection alive through the GCP firewall
PersistentKeepalive = 25