[Interface]
# The internal virtual IP address of the VPN server gateway
Address = 10.0.0.1/24

# Automatically save configuration changes made via the 'wg' command
SaveConfig = true

# The custom UDP port opened in the GCP Firewall for incoming VPN traffic
ListenPort = 51820

# SERVER PRIVATE KEY (Keep this secret on your server! Never push the real key to GitHub)
PrivateKey = <YOUR_SERVER_PRIVATE_KEY>

# Firewall rules to enable IP Forwarding and NAT (Network Address Translation) when the tunnel starts
# Replace 'ens4' with your server's actual default network interface name if different
PostUp = ufw route allow in on wg0 && iptables -t nat -A POSTROUTING -o ens4 -j MASQUERADE

# Firewall rules to clean up NAT routes when the tunnel shuts down
PostDown = ufw route delete allow in on wg0 && iptables -t nat -D POSTROUTING -o ens4 -j MASQUERADE

[Peer]
# CLIENT PUBLIC KEY (The public key matching the device you want to allow)
PublicKey = <YOUR_CLIENT_PUBLIC_KEY>

# The specific internal IP allocated to this client device
AllowedIPs = 10.0.0.2/32